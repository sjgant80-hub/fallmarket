name: Refresh listings
on:
  schedule:
    - cron: '0 4 * * *'  # 04:00 UTC daily
  workflow_dispatch:
jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Regenerate listings.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/import-trios.mjs --include-standalone > listings.json || echo "generation skipped"
      - name: Rebuild catalog.md + sitemap.xml
        run: node scripts/build-catalog.mjs || echo "catalog build skipped"
      - name: Commit if changed
        run: |
          if ! git diff --quiet listings.json catalog.md sitemap.xml; then
            git config user.name "fallmarket-bot"
            git config user.email "bot@ai-nativesolutions.com"
            git add listings.json catalog.md sitemap.xml
            git commit -m "refresh · $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
