<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Listing · FallMarket</title>
<meta name="description" content="Listing on FallMarket, the sovereign registry of AI tools, agents, SDKs, and MCP servers.">
<meta name="robots" content="index, follow">
<meta property="og:type" content="product">
<meta property="og:site_name" content="FallMarket">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header>
  <div class="wrap">
    <a class="logo" href="./"><span>Fall</span>Market</a>
    <nav class="brand-links">
      <a href="about.html">About</a>
      <a href="publishers.html">Publishers</a>
      <a href="faq.html">FAQ</a>
      <a href="glossary.html">Glossary</a>
      <a href="docs/agent-mcp.md">Agent API</a>
      <a href="https://github.com/sjgant80-hub/fallmarket">GitHub</a>
    </nav>
  </div>
</header>

<main class="detail">
  <div class="wrap">
    <div class="breadcrumb"><a href="./">← Catalog</a></div>
    <div id="detail-content">Loading…</div>
  </div>
</main>

<footer>
  <div class="wrap">
    <div><strong>FallMarket</strong> · MIT · <a href="https://ai-nativesolutions.com">AI-Native Solutions</a> · <a href="llms.txt">llms.txt</a></div>
    <div class="foot-links">
      <a href="./">Browse</a>
      <a href="about.html">About</a>
      <a href="faq.html">FAQ</a>
      <a href="https://github.com/sjgant80-hub/fallmarket">GitHub</a>
    </div>
  </div>
<div class="konomi-attribution" style="text-align:center;padding:0.75rem 0;font-size:11px;color:var(--dim);border-top:1px solid var(--border);"><!-- KONOMI-POWERED-BY -->Powered by <a href="https://github.com/sjgant80-hub/konomi">Konomi Architecture</a> · Substrate 0 · Thomas Frumkin</div>
</footer>

<script type="module">
import { openCheckout } from './assets/checkout.js';
const params = new URLSearchParams(location.search);
const id = params.get('id');
const content = document.getElementById('detail-content');
window._currentListing = null;
window._openCheckout = () => window._currentListing && openCheckout(window._currentListing);

if (!id) {
  content.innerHTML = '<h1>No listing id</h1><p>Go back to the <a href="./">catalog</a>.</p>';
} else {
  fetch('./listings.json', { cache: 'no-store' })
    .then(r => r.json())
    .then(j => {
      const l = (j.listings || []).find(x => x.id === id);
      if (!l) {
        content.innerHTML = `<h1>Not found</h1><p>No listing with id <code>${escape(id)}</code>. Return to <a href="./">catalog</a>.</p>`;
        return;
      }
      window._currentListing = l;
      document.title = `${l.title} · FallMarket`;
      const md = document.querySelector('meta[name="description"]');
      if (md) md.setAttribute('content', l.subtitle || l.description || l.title);
      const ogt = document.querySelector('meta[property="og:title"]') || createMeta('og:title');
      ogt.setAttribute('content', `${l.title} · FallMarket`);
      const ogd = document.querySelector('meta[property="og:description"]') || createMeta('og:description');
      ogd.setAttribute('content', l.subtitle || l.description || l.title);
      const canonical = document.querySelector('link[rel="canonical"]') || createLink('canonical');
      canonical.setAttribute('href', `https://sjgant80-hub.github.io/fallmarket/listing.html?id=${encodeURIComponent(l.id)}`);
      injectJsonLd(l);
      render(l);
    })
    .catch(e => { content.innerHTML = `<p>Error loading catalog: ${escape(e.message)}</p>`; });
}

function createMeta(prop) {
  const m = document.createElement('meta');
  m.setAttribute('property', prop);
  document.head.appendChild(m);
  return m;
}

function createLink(rel) {
  const l = document.createElement('link');
  l.setAttribute('rel', rel);
  document.head.appendChild(l);
  return l;
}

function injectJsonLd(l) {
  const url = `https://sjgant80-hub.github.io/fallmarket/listing.html?id=${encodeURIComponent(l.id)}`;
  const price = l.tiers?.[0]?.price_gbp ?? 0;
  const jsonld = {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": l.title,
    "description": l.subtitle || l.description || l.title,
    "url": url,
    "applicationCategory": l.kind === 'api' ? 'DeveloperApplication' : (l.kind === 'tool' ? 'UtilitiesApplication' : 'DeveloperApplication'),
    "operatingSystem": "Any",
    "offers": {
      "@type": "Offer",
      "price": price,
      "priceCurrency": "GBP",
      "availability": "https://schema.org/InStock",
      "url": url,
      "seller": {
        "@type": "Organization",
        "name": (l.publisher === 'ai-native-solutions' || l.guild === 'ai-native-solutions') ? 'AI-Native Solutions' : (l.publisher || l.guild || l.seller_did)
      }
    },
    "license": "https://opensource.org/licenses/MIT",
    "isPartOf": {
      "@type": "WebSite",
      "name": "FallMarket",
      "url": "https://sjgant80-hub.github.io/fallmarket/"
    }
  };
  if (l.repo_url) jsonld.codeRepository = l.repo_url;
  if (l.playground_url) jsonld.sameAs = [l.playground_url];
  const s = document.createElement('script');
  s.type = 'application/ld+json';
  s.textContent = JSON.stringify(jsonld);
  document.head.appendChild(s);

  const breadcrumb = {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "FallMarket", "item": "https://sjgant80-hub.github.io/fallmarket/" },
      { "@type": "ListItem", "position": 2, "name": l.kind.toUpperCase(), "item": `https://sjgant80-hub.github.io/fallmarket/?kind=${l.kind}` },
      { "@type": "ListItem", "position": 3, "name": l.title, "item": url }
    ]
  };
  const s2 = document.createElement('script');
  s2.type = 'application/ld+json';
  s2.textContent = JSON.stringify(breadcrumb);
  document.head.appendChild(s2);
}

function render(l) {
  const price = l.tiers?.[0]?.price_gbp === 0 ? 'Free · MIT' : `£${l.tiers?.[0]?.price_gbp}`;
  const publisherBadge = (l.publisher === 'ai-native-solutions' || l.guild === 'ai-native-solutions') ? `<span class="publisher-badge">◊ AI-Native Solutions</span>` : '';

  const installBlocks = [];
  if (l.install?.npm) installBlocks.push(installLine('npm', l.install.npm));
  if (l.install?.mcp) installBlocks.push(installLine('mcp', l.install.mcp));
  if (l.install?.docker) installBlocks.push(installLine('docker', l.install.docker));
  if (l.install?.curl) installBlocks.push(installLine('curl', l.install.curl));

  content.innerHTML = `
    <div class="detail-head">
      <div class="meta">
        <div class="kind-row">
          <span class="kind ${l.kind}">${l.kind}</span>
          ${publisherBadge}
        </div>
        <h1>${escape(l.title)}</h1>
        <p class="subtitle">${escape(l.subtitle || '')}</p>
        <div style="margin-top: 1rem; color: var(--dim); font-size: 13px;">
          <div>Seller · <a href="seller.html?did=${encodeURIComponent(l.seller_did)}">${escape(l.seller_did)}</a></div>
          ${l.repo_url ? `<div>Source · <a href="${l.repo_url}" target="_blank" rel="noopener">${escape(l.repo_url)}</a></div>` : ''}
          ${l.playground_url ? `<div>Playground · <a href="${l.playground_url}" target="_blank" rel="noopener">${escape(l.playground_url)}</a></div>` : ''}
          <div>Created · ${new Date(l.created).toLocaleDateString()}</div>
        </div>
      </div>
      <div class="buy">
        <h3>Free tier</h3>
        <div class="price-big">${price}</div>
        <p>${escape(l.tiers?.[0]?.includes?.join(' · ') || 'MIT source · self-host · community support')}</p>
        <button class="primary" onclick="window._openCheckout()">Hire</button>
        <div class="fine">Ed25519-signed listing · benchmark verified on delivery · funds escrow via FallColony</div>
      </div>
    </div>

    ${installBlocks.length ? `
    <section class="detail-section">
      <h2>Install</h2>
      <div class="install-blocks">${installBlocks.join('')}</div>
    </section>
    ` : ''}

    ${l.tags?.length ? `
    <section class="detail-section">
      <h2>Tags</h2>
      <div>${l.tags.map(t => `<span class="chip">${escape(t)}</span>`).join(' ')}</div>
    </section>
    ` : ''}

    ${l.description ? `
    <section class="detail-section">
      <h2>Description</h2>
      <p style="color: var(--ink); line-height: 1.7;">${escape(l.description)}</p>
    </section>
    ` : ''}

    <section class="detail-section">
      <h2>Trust</h2>
      <p style="color: var(--dim); font-size: 14px;">
        Benchmark results ship in Phase 3. Every listing will carry Ed25519-signed scores from a neutral runner.
        Buyers can supply their own test case — the product runs against it and pays out on pass.
      </p>
    </section>
  `;

  document.querySelectorAll('.install-line button').forEach(btn => {
    btn.addEventListener('click', () => {
      navigator.clipboard.writeText(btn.dataset.cmd);
      btn.textContent = 'Copied';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1400);
    });
  });
}

function installLine(label, cmd) {
  return `<div class="install-line"><span class="label">${label}</span><code>${escape(cmd)}</code><button data-cmd="${escapeAttr(cmd)}">Copy</button></div>`;
}

function escape(s) { return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
function escapeAttr(s) { return escape(s).replace(/"/g, '&quot;'); }
</script>

</body>
</html>
